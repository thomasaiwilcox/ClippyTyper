name: CI

on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:
    branches: [ main, 'release/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (SwiftPM)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (Debug)
        run: swift build

      - name: Test
        run: swift test --parallel

  lint:
    name: Lint (optional)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linters
        run: |
          brew update
          brew install swiftformat swiftlint || true

      - name: Run lint script
        run: |
          chmod +x Scripts/lint.sh
          ./Scripts/lint.sh || true

  xcode-build:
    name: Build (Xcode)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew update
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: |
          cd xcode
          xcodegen generate

      - name: Build app target
        run: |
          xcodebuild -project xcode/ClippyTyper.xcodeproj -scheme ClippyTyper -configuration Debug -destination 'platform=macOS' build | xcpretty || true
        env:
          NSUnbufferedIO: "YES"

  xcode-test:
    name: Test (Xcode)
    runs-on: macos-14
    continue-on-error: true # UI automation may be restricted on runners
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew update
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: |
          cd xcode
          xcodegen generate

      - name: Test app scheme (includes UI tests)
        run: |
          xcodebuild -project xcode/ClippyTyper.xcodeproj -scheme ClippyTyper -destination 'platform=macOS' test || true
        env:
          NSUnbufferedIO: "YES"
